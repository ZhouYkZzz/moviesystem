# 数据集
dataset: ml1m_seq
data_path: ./recbole_data

# 基本字段
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: timestamp

# 仅加载交互表所需列，并按时间构造序列
load_col:
  inter: [user_id, item_id, timestamp]

ordering_args:
  strategy: by
  field: timestamp

# 序列推荐设置
MAX_ITEM_LIST_LENGTH: 50
ITEM_LIST_LENGTH_FIELD: item_length
ITEM_LIST_FIELD: item_id_list

# 按时间顺序做留出验证/测试，使用 full-sort 评估
eval_args:
  group_by: user
  order: TO
  split: { LS: valid_and_test }
  mode: full

# 评估指标
metrics: [Recall, NDCG, MRR]
topk: [10, 20]
valid_metric: NDCG@10

# BERT4Rec 模型参数
model: BERT4Rec
hidden_size: 128
num_hidden_layers: 2
num_attention_heads: 4
inner_size: 256
hidden_dropout_prob: 0.1
attention_probs_dropout_prob: 0.1
mask_ratio: 0.2

# 训练参数
epochs: 30
train_batch_size: 512
eval_batch_size: 512
learning_rate: 0.0005
weight_decay: 1e-5

# 每轮验证，连续 5 次无提升则早停
eval_step: 1
stopping_step: 5

# 序列推荐通常不需要训练时负采样
train_neg_sample_args: ~

# 使用 CUDA
device: cuda
